# TopperRest Configuration

rest:
  # Port to run the REST server on
  port: 4567
  # Bind address (use 0.0.0.0 for all interfaces)
  bind-address: "0.0.0.0"
  # Optional API key — leave empty to disable authentication
  # When set, all requests must include the header: X-API-Key: <your-key>
  api-key: ""
  # Maximum concurrent connections
  max-connections: 50
  # Request timeout in seconds
  request-timeout: 10
  # Thread pool size for handling requests
  threads: 4

cache:
  # How long (in seconds) to cache snapshot results before re-fetching from Topper
  # Lower values = more up-to-date data, higher CPU usage
  # Higher values = slightly stale data, lower CPU usage
  ttl-seconds: 5
  # How long (in seconds) to cache player name lookups (UUID -> name)
  player-name-ttl-seconds: 300

rate-limit:
  # Enable per-IP rate limiting
  enabled: true
  # Maximum requests per window
  max-requests: 100
  # Window duration in seconds
  window-seconds: 60

geyser:
  # Prefix used for Bedrock player name lookups via the REST API
  # e.g. GET /api/v1/player/~BedrockName
  bedrock-prefix: "~"
